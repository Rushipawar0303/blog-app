<!doctype html>
<html>
  <head>
    <title>Online Blog Application</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        padding: 20px;
      }

      h1 {
        color: blue;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
      }

      button {
        padding: 10px 20px;
        margin-top: 10px;
        border: none;
        color: white;
        cursor: pointer;
      }

      .addbtn {
        background: blue;
      }

      .editbtn {
        background: orange;
      }

      .deletebtn {
        background: red;
      }

      .post {
        background: white;
        padding: 15px;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <h1>Online Blog Application</h1>

    <input type="text" id="title" placeholder="Enter Title" />

    <textarea id="content" rows="5" placeholder="Write Content"></textarea>

    <button class="addbtn" onclick="addPost()">Add Post</button>

    <div id="posts"></div>

    <script>
      async function loadPosts() {
        const response = await fetch("/posts");

        const posts = await response.json();

        const postDiv = document.getElementById("posts");

        postDiv.innerHTML = "";

        posts.forEach((post, index) => {
          postDiv.innerHTML += `

        <div class="post">

            <h2>${post.title}</h2>

            <p>${post.content}</p>

            <button class="editbtn"
            onclick="editPost(${index})">
            Edit
            </button>

            <button class="deletebtn"
            onclick="deletePost(${index})">
            Delete
            </button>

        </div>
        `;
        });
      }

      async function addPost() {
        const title = document.getElementById("title").value;

        const content = document.getElementById("content").value;

        await fetch("/posts", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            title,
            content,
          }),
        });

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";

        loadPosts();
      }

      async function deletePost(id) {
        await fetch(`/posts/${id}`, {
          method: "DELETE",
        });

        loadPosts();
      }

      async function editPost(id) {
        const newTitle = prompt("Enter new title");

        const newContent = prompt("Enter new content");

        await fetch(`/posts/${id}`, {
          method: "PUT",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            title: newTitle,
            content: newContent,
          }),
        });

        loadPosts();
      }

      loadPosts();
    </script>
  </body>
</html>
