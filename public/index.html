<!doctype html>
<html>
  <head>
    <title>Cloud Blog Application</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        padding: 20px;
      }

      h1 {
        color: blue;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
      }

      button {
        padding: 10px 20px;
        background: blue;
        color: white;
        border: none;
        margin-top: 10px;
      }

      .post {
        background: white;
        padding: 15px;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <h1>Online Blog Application</h1>

    <input type="text" id="title" placeholder="Enter Title" />

    <textarea id="content" rows="5" placeholder="Write Blog Content"></textarea>

    <button onclick="addPost()">Add Post</button>

    <div id="posts"></div>

    <script>
      async function loadPosts() {
        const response = await fetch("/posts");

        const posts = await response.json();

        const postDiv = document.getElementById("posts");

        postDiv.innerHTML = "";

        posts.forEach((post) => {
          postDiv.innerHTML += `
            <div class="post">
                <h2>${post.title}</h2>
                <p>${post.content}</p>
            </div>
        `;
        });
      }

      async function addPost() {
        const title = document.getElementById("title").value;

        const content = document.getElementById("content").value;

        await fetch("/posts", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            title,
            content,
          }),
        });

        loadPosts();

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
      }

      loadPosts();
    </script>
  </body>
</html>
